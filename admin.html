<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>일정 관리자 | 다이빙솔루션</title><link rel="stylesheet" href="styles.css"></head><body><main class="wrap">
<header class="top"><a class="brand" href="/"><div class="logo">DS</div><div><b>일정 관리자</b><small>다이빙솔루션</small></div></a><a class="pill" href="/">공개 일정표</a></header>
<section id="loginView" class="loginwrap"><div class="card loginbox"><h1>관리자 로그인</h1><p style="color:var(--muted)">Supabase에 등록한 관리자 이메일과 비밀번호로 로그인하세요.</p><form id="loginForm"><div class="field"><label>이메일</label><input id="email" type="email" required></div><div class="field"><label>비밀번호</label><input id="password" type="password" required></div><button class="btn primary" type="submit">로그인</button></form></div></section>
<section id="adminView" class="hidden"><div class="toolbar"><div><h1 style="margin:0">일정 관리</h1><p style="color:var(--muted)">저장 즉시 공개 캘린더에 반영됩니다.</p></div><button id="logout" class="btn">로그아웃</button></div>
<div class="admin-grid"><div class="card formcard"><div class="notice">당일 일정은 아래 ‘당일 일정’에 체크하세요.</div><form id="eventForm">
<div class="field"><label>일정 제목</label><input id="title" required placeholder="제목을 기입하세요"></div>
<div class="row"><div class="field"><label>시작일</label><input id="start_date" type="date" required></div><div class="field"><label>종료일</label><input id="end_date" type="date"></div></div>
<div class="checkline"><input id="same_day" type="checkbox"><label for="same_day">당일 일정</label></div>
<div class="row"><div class="field"><label>분류</label><select id="category"><option>국내투어</option><option>해외투어</option><option>교육</option><option>프로과정</option></select></div><div class="field"><label>상태</label><select id="status"><option>모집중</option><option>마감임박</option><option>마감</option></select></div></div>
<div class="field"><label>장소</label><input id="location" placeholder="장소를 기입하세요"></div><div class="field"><label>간단한 안내</label><textarea id="description" placeholder="일정에 대한 간단한 안내를 기입하세요"></textarea></div><div class="field"><label>상세 페이지 주소</label><input id="detail_url" type="url" placeholder="https://..."></div>
<div class="actions"><button class="btn primary" type="submit"><span id="saveText">일정 저장</span></button><button class="btn hidden" id="cancelEdit" type="button">수정 취소</button></div></form></div>
<div class="card tablecard"><h2>등록된 일정</h2><div id="items"></div></div></div></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="admin.js"></script></body></html>
