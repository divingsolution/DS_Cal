<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>다이빙솔루션 일정표</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="calendar.css">
</head>
<body>
<main class="wrap">
  <header class="top">
    <a class="brand" href="/">
      <div class="logo">DS</div>
      <div>
        <b>DIVING SOLUTION</b>
        <small>교육 · 국내외 다이빙 투어</small>
      </div>
    </a>

    <div class="contact-actions">
      <!-- 아래 카카오톡 링크를 실제 1:1 채팅 링크로 교체하세요. -->
      <a
        class="contact-btn kakao"
        href="https://pf.kakao.com/_sxaxmfK/chat"
        target="_blank"
        rel="noopener"
      >
        카카오톡 1:1 상담
      </a>

      <a class="contact-btn phone" href="tel:01096245805">
        전화 문의
      </a>
    </div>
  </header>

  <section class="hero">
    <h1>이번 달,<span>바다로 떠날 시간</span></h1>
    <p>
      다이빙솔루션의 교육과 국내외 투어 일정을 확인하세요.
      일정은 수시로 업데이트됩니다.
    </p>
  </section>

  <div class="toolbar">
    <div class="monthnav">
      <button class="pill" id="prev" aria-label="이전 달">←</button>
      <div class="monthtitle" id="monthTitle"></div>
      <button class="pill" id="next" aria-label="다음 달">→</button>
      <button class="pill" id="today">오늘</button>
    </div>

    <div class="filters">
      <button class="chip active" data-filter="전체">전체</button>
      <button class="chip" data-filter="국내투어">국내투어</button>
      <button class="chip" data-filter="해외투어">해외투어</button>
      <button class="chip" data-filter="교육">교육</button>
      <button class="chip" data-filter="프로과정">프로과정</button>
    </div>
  </div>

  <section class="card calendar">
    <div class="week calendar-week-header">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>

    <div id="calendarBody" class="calendar-body"></div>
    <div class="list" id="list"></div>
  </section>
</main>

<div class="modal" id="modal">
  <div class="modalbox">
    <h2 id="mTitle"></h2>
    <div class="meta" id="mInfo"></div>
    <div class="actions">
      <a class="btn primary" id="mLink" target="_blank" rel="noopener">상세 페이지 보기</a>
      <button class="btn" id="close">닫기</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
